# rh_p12_gripper_controller Рђћ teleop spawnerВџЕ (position stateвДї mock HWВЌљ вДъВХц)
/**:
  rh_p12_gripper_controller:
    ros__parameters:
      joints:
        - rh_p12_rn
        - rh_r2
        - rh_l1
        - rh_l2
      command_interfaces:
        - position
      state_interfaces:
        - position
      state_publish_rate: 50.0
      action_monitor_rate: 20.0
      allow_partial_joints_goal: false
      constraints:
        stopped_velocity_tolerance: 0.02
        goal_time: 0.0
